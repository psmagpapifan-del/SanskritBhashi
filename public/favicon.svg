<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="saffronGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9933" />
      <stop offset="100%" stop-color="#FF5500" />
    </linearGradient>
  </defs>
  <!-- Saffron Rounded Canvas -->
  <rect width="512" height="512" rx="112" fill="url(#saffronGrad)" />
  <!-- Border -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#FFD700" stroke-width="12" opacity="0.8" />
  <!-- Devanagari 'स' in Gold/Cream -->
  <text x="256" y="340" font-family="'Noto Serif Devanagari', 'Tiro Sanskrit', serif" font-size="280" font-weight="bold" fill="#FAF9F6" text-anchor="middle">स</text>
  <!-- Accent dot / bindu representing consciousness -->
  <circle cx="370" cy="120" r="28" fill="#FFB300" />
</svg>
